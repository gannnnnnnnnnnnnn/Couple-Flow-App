<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97362" />
    <meta
      name="description"
      content="给两个人一起玩的一周计划小看板。"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <title>Couple Flow</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__COUPLE_FLOW_BOOTED__ = false;
      window.__COUPLE_FLOW_SHOW_BOOT_FALLBACK__ = function () {
        if (window.__COUPLE_FLOW_BOOTED__) return;
        var root = document.getElementById('root');
        if (!root || root.childElementCount > 0) return;
        root.innerHTML =
          '<main style="min-height:100vh;background:#fff7ed;color:#221915;padding:24px;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">' +
          '<section style="max-width:520px;margin:0 auto;padding-top:20vh">' +
          '<h1 style="font-size:24px;line-height:1.2;margin:0 0 12px;font-weight:800">发现新版本，刷新后继续使用。</h1>' +
          '<button type="button" onclick="window.location.reload()" style="height:44px;border:0;border-radius:6px;background:#221915;color:#fff7ed;padding:0 18px;font-weight:800">刷新到新版本</button>' +
          '</section></main>';
      };
      window.addEventListener(
        'error',
        function (event) {
          if (event.target && event.target.tagName === 'SCRIPT') {
            window.__COUPLE_FLOW_SHOW_BOOT_FALLBACK__();
          }
        },
        true,
      );
      window.setTimeout(window.__COUPLE_FLOW_SHOW_BOOT_FALLBACK__, 6000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
